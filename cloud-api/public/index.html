<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud API — Lab Concreto (local)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  body{margin:0;background:#0f172a;color:#e2e8f0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}
  h1{font-size:18px} .card{background:#1e293b;border:1px solid #475569;border-radius:12px;padding:16px}
  canvas{width:100%!important;height:200px!important}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:7px 6px;border-bottom:1px solid #334155;text-align:left}
  th{color:#94a3b8;font-size:11px;text-transform:uppercase}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .muted{color:#94a3b8;font-size:12px} code{background:#334155;padding:1px 6px;border-radius:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧱 Cloud API — dashboard local</h1>
  <div class="muted">App dedicado (Node + SQLite + MQTT). Ingerindo de <code id="src">MQTT</code>. Atualiza via SSE.</div>
  <div class="card"><canvas id="chart"></canvas><div class="muted" id="lbl">Aguardando ensaio…</div></div>
  <div class="card">
    <b>Ensaios persistidos</b>
    <table><thead><tr><th>ID</th><th>Início</th><th>Device</th><th class="num">Pico kN</th><th class="num">MPa</th><th>Status</th></tr></thead>
    <tbody id="rows"></tbody></table>
  </div>
  <div class="muted">REST: <code>GET /api/ensaios</code> · <code>GET /api/ensaios/:id</code> · <code>POST /api/dispositivos/:id/comando</code></div>
</div>
<script>
const chart = new Chart(document.getElementById('chart'), {
  type:'line', data:{labels:[],datasets:[{label:'kN',data:[],borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.15)',fill:true,pointRadius:0,borderWidth:2,tension:.25}]},
  options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#64748b',maxTicksLimit:6},grid:{color:'#1e293b'}},y:{beginAtZero:true,ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}
});
async function refresh(){
  const ensaios = await (await fetch('/api/ensaios')).json();
  document.getElementById('rows').innerHTML = ensaios.map(e=>`<tr>
    <td>${e.id}</td><td>${e.started_at?.slice(11)||''}</td><td>${e.device}</td>
    <td class="num">${e.pico_kN?.toFixed(1)??'—'}</td><td class="num">${e.tensao_MPa?.toFixed(1)??'—'}</td>
    <td>${e.status}</td></tr>`).join('') || '<tr><td colspan="6" class="muted">Nenhum ensaio.</td></tr>';
  if(ensaios[0]){
    const e = await (await fetch('/api/ensaios/'+ensaios[0].id)).json();
    const pts = (e.leituras||[]).filter(l=>typeof l.carga_kN==='number');
    chart.data.labels = pts.map(l=>((l.t_ms||0)/1000).toFixed(1)+'s');
    chart.data.datasets[0].data = pts.map(l=>+l.carga_kN.toFixed(1));
    chart.update('none');
    document.getElementById('lbl').textContent = `Ensaio #${e.id} · ${e.device} · ${e.status}`;
  }
}
refresh();
const es = new EventSource('/api/stream');
es.onmessage = ()=>refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
