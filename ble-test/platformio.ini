; Firmware de TESTE BLE (Bluetooth) — separado do gateway WiFi.
; Grava com:  pio run -d ble-test -t upload --upload-port /dev/cu.usbserial-0001
; Para voltar ao gateway WiFi:  pio run -d gateway-esp32 -t upload
[env:ble-test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; BLE (BlueDroid) ocupa bastante flash -> particao de app grande
board_build.partitions = huge_app.csv
