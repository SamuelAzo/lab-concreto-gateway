name: lab_concreto_cp
description: App que le o codigo de barras do corpo de prova (camera) e envia ao gateway ESP32 via BLE.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.2.3      # camera 1D/2D (iOS + Android)
  flutter_blue_plus: ^1.32.12 # BLE central (conecta no ESP32)

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
