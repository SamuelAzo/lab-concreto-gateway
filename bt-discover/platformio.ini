; Firmware rapido p/ DESCOBRIR o leitor de codigo de barras Bluetooth (nome + MAC).
; Grava:  pio run -d bt-discover -t upload --upload-port /dev/cu.usbserial-0001
; Depois volta o gateway:  pio run -d gateway-esp32 -t upload
[env:bt-discover]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
