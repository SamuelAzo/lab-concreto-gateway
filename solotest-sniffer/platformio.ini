; Sniffer serial pro ESP32: le a prensa (via MAX3232 em GPIO16/17) e despeja o
; dado CRU em hex+ASCII no monitor USB (115200). Use p/ decodificar a Solotest.
;   pio run -d solotest-sniffer -t upload --upload-port /dev/cu.usbserial-0001
;   (depois leia a serial USB a 115200 enquanto a prensa faz uma leitura/ruptura)
[env:solotest-sniffer]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
