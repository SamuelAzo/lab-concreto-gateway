; Prober ativo: ESP32 ENVIA comandos de requisicao p/ a prensa (via MAX3232) e
; escuta a resposta. Descobre o comando + baud quando a prensa e query/resposta.
;   pio run -d press-prober -t upload --upload-port /dev/cu.usbserial-0001
;   (depois leia a serial USB 115200; veja qual [baud][cmd] teve RESP)
[env:press-prober]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
